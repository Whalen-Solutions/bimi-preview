# Copy to docker-compose.override.yml and adjust as needed.
#
# Connects this application to a shared Docker network managed by
# a separate compose stack running nginx as a reverse proxy.
#
# Systemd ordering:
#   In the systemd unit for this application, use After= and
#   Requires= referencing the nginx service unit to ensure the
#   nginx network exists before this service starts.
#
# nginx upstream configuration:
#   Use a variable to avoid nginx crashing if this service starts
#   after nginx:
#
#     resolver 127.0.0.11 valid=30s;
#     set $upstream http://bimi-preview:8000;
#     proxy_pass $upstream;
#
#   127.0.0.11 is Docker's embedded DNS server. Variable-based
#   resolution happens at request time, not at nginx startup.

services:
  bimi-preview:
    networks:
      - nginx

networks:
  nginx:
    external: true
